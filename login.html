<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OnecentralBank Demo — Sign In</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in with your email to continue to your account.</p>

    <div class="error-msg" id="errorMsg">Invalid email or password. Try again.</div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@gmail.com" value="demo@gmail.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" value="demo1234">
    </div>

    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>

    <p class="note">Demo prototype — any email/password works. No real Gmail authentication is performed.</p>
  </div>
</div>

<script src="modules/auth.js"></script>
</body>
</html>
